<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Museum Opportunity Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1C1F26;--surface:#252A34;--sf2:#2E3340;--sf3:#363C4A;
  --bd:#3A4055;--bd2:#4A5268;--bd3:#626880;
  --tx:#E8EBF2;--tx2:#8A93A8;--tx3:#55607A;
  --accent:#E8003D;--accent-dim:rgba(232,0,61,0.11);
  --g50:#1E3016;--g200:#4A8C1C;--g600:#6DB33F;--g800:#A3D977;
  --b50:#1A2E44;--b600:#5B9FE8;--b800:#A8CBEF;
  --a50:#272010;--a600:#C97D1A;--a800:#ECC96A;
  --r50:#271616;--r600:#E87878;--r800:#F5B8B8;
  --conn:#3A4055;
  color-scheme:dark;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--bd3)}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--bd);padding:0 20px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tl{display:flex;align-items:center;gap:10px}
.logo{width:26px;height:26px;background:var(--accent);border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;flex-shrink:0}
.tbar-title{font-size:14px;font-weight:500}
.tbar-sub{font-size:12px;color:var(--tx3)}
.tab-grp{display:flex;background:var(--sf2);border-radius:6px;padding:3px;gap:2px}
.tab{border:1px solid transparent;background:none;padding:5px 14px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--tx2);font-family:inherit;transition:all .15s}
.tab.on{background:var(--surface);color:var(--tx);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.4);border-color:var(--bd2)}

.pane{display:none;flex:1;overflow:hidden;flex-direction:column}
.pane.on{display:flex}

/* ══ ORG TREE ══ */
.tree-scroll{flex:1;overflow:auto;padding:32px 40px}
.vline{width:1.5px;height:22px;background:var(--conn);margin:0 auto}
.vline-s{width:1.5px;height:16px;background:var(--conn);margin:0 auto}
.tree-row{display:flex;justify-content:center;gap:14px;width:100%;flex-wrap:wrap}
.ncol{display:flex;flex-direction:column;align-items:center}
.caret{font-size:12px;color:var(--tx3);margin-top:5px;display:block;opacity:.65;transition:opacity .15s}
.n-l2:hover .caret{opacity:1}
.np .caret{color:var(--g600)}.gov .caret{color:var(--b600)}.hyb .caret{color:var(--a600)}.com .caret{color:var(--r600)}

.n-root{background:var(--accent);color:#fff;border-radius:8px;padding:14px 28px;text-align:center;cursor:pointer;min-width:240px;user-select:none;transition:opacity .15s}
.n-root:hover{opacity:.88}
.n-root-title{font-size:14px;font-weight:600;margin-bottom:2px}
.n-root-sub{font-size:11px;color:rgba(255,255,255,.65);margin-bottom:4px}
.n-root-gtv{font-size:12px;color:rgba(255,255,255,.8);font-weight:500}

.n-l2{border-radius:6px;padding:11px 16px;text-align:center;cursor:pointer;min-width:155px;user-select:none;transition:box-shadow .15s;border:1.5px solid transparent;height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.n-l2:hover{box-shadow:0 2px 12px rgba(0,0,0,.35)}
.l2-card-wrap{position:relative;display:inline-block}
.l2-info{position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:10;cursor:default;font-size:12px;font-weight:400;font-style:italic;font-family:Georgia,serif;line-height:1;transition:transform .18s,box-shadow .18s;user-select:none}
.l2-info:hover{transform:translateY(-50%) scale(1.15)}
.l2-info.np{background:var(--g600);color:#fff;box-shadow:0 0 0 2px var(--g50),0 2px 8px rgba(109,179,63,.45)}
.l2-info.gov{background:var(--b600);color:#fff;box-shadow:0 0 0 2px var(--b50),0 2px 8px rgba(91,159,232,.45)}
.l2-info.hyb{background:var(--a600);color:#fff;box-shadow:0 0 0 2px var(--a50),0 2px 8px rgba(201,125,26,.45)}
.l2-info.com{background:var(--r600);color:#fff;box-shadow:0 0 0 2px var(--r50),0 2px 8px rgba(232,120,120,.45)}
.l2-info.np:hover{box-shadow:0 0 0 2px var(--g50),0 0 14px rgba(109,179,63,.75)}
.l2-info.gov:hover{box-shadow:0 0 0 2px var(--b50),0 0 14px rgba(91,159,232,.75)}
.l2-info.hyb:hover{box-shadow:0 0 0 2px var(--a50),0 0 14px rgba(201,125,26,.75)}
.l2-info.com:hover{box-shadow:0 0 0 2px var(--r50),0 0 14px rgba(232,120,120,.75)}
.tt-wrap{position:relative;display:inline-block}
.tt-panel{display:none;position:fixed;top:155px;left:50%;transform:translateX(-50%);width:min(1060px,96vw);max-height:70vh;overflow-y:auto;background:var(--sf2);border:1px solid var(--bd2);border-radius:12px;z-index:999;text-align:left;box-shadow:0 20px 70px rgba(0,0,0,.75);pointer-events:none;font-style:normal;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
.tt-panel.visible{display:block;pointer-events:auto}
.tt-close{position:absolute;top:11px;right:14px;background:none;border:none;color:var(--tx3);font-size:18px;line-height:1;cursor:pointer;padding:2px 5px;border-radius:3px;font-family:inherit;transition:color .15s,background .15s;z-index:1}
.tt-close:hover{color:var(--tx);background:var(--bd)}
.tm-top{display:flex;align-items:center;gap:10px;margin-bottom:9px;padding-right:28px}
.tm-hdr{padding:14px 20px 13px;border-bottom:1px solid var(--bd);background:var(--sf3)}

.tm-title{font-size:15px;font-weight:700;color:var(--tx)}
.tm-tag{font-size:11px;color:var(--tx3);padding:2px 9px;background:var(--bg);border:1px solid var(--bd);border-radius:20px;white-space:nowrap}
.tm-summary{display:flex;flex-direction:column;gap:7px}
.tm-sum-item{display:flex;gap:12px;align-items:baseline}
.tm-sum-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);flex:0 0 80px;flex-shrink:0}
.tm-sum-val{font-size:12px;color:var(--tx2);line-height:1.5;flex:1}
.tm-body{padding:14px 20px 16px}
.tm-cards{display:flex;gap:12px;margin-bottom:11px}
.tm-card{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:8px;overflow:hidden;min-width:0}
.tm-card-hdr{padding:7px 12px;background:var(--sf3);border-bottom:1px solid var(--bd);font-size:12px;font-weight:600;color:var(--tx)}
.tm-fields{padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.tm-field{display:flex;align-items:flex-start;gap:10px}
.tm-fl{flex:0 0 100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.45px;color:var(--tx3);padding-top:3px;line-height:1.3;flex-shrink:0}
.tm-fv{flex:1;font-size:12px;color:var(--tx2);line-height:1.5;min-width:0}
.tm-fvi{flex:1;font-size:11.5px;color:var(--tx3);line-height:1.5;font-style:italic;min-width:0}
.tm-chips{display:flex;flex-wrap:wrap;gap:4px}
.tm-chip{font-size:11px;color:var(--tx2);background:var(--sf3);border:1px solid var(--bd);border-radius:20px;padding:2px 9px;white-space:nowrap}
.tm-chip-bd{font-size:11px;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(232,0,61,.25);border-radius:20px;padding:2px 9px;white-space:nowrap}
.tm-key-diff{display:flex;align-items:flex-start;gap:10px;background:var(--sf3);border:1px solid var(--bd);border-radius:6px;padding:8px 12px}
.tm-kdl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);white-space:nowrap;flex-shrink:0}
.tm-kdv{font-size:12px;color:var(--tx2);line-height:1.5}
.tm-split{display:flex;background:var(--bg);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:11px}
.tm-split-side{flex:1;min-width:0}
.tm-split-hdr{padding:7px 12px;background:var(--sf3);border-bottom:1px solid var(--bd);font-size:11px;font-weight:600;color:var(--tx)}
.tm-split-div{width:1px;background:var(--bd);flex-shrink:0}
.tm-fact{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:7px;margin-bottom:11px}
.tm-bd-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.n-l2-bubble{display:block;text-align:center;margin-bottom:5px}
.n-l2-bubble-inner{display:inline-flex;flex-direction:column;align-items:center;gap:2px;padding:4px 11px;border-radius:10px;border:1px solid;font-size:9px;font-weight:600;letter-spacing:.3px;white-space:nowrap;line-height:1.4}
.n-l2-bubble-lbl{font-size:8px;font-weight:400;font-style:italic;opacity:.7;letter-spacing:.15px}
.n-l2-bubble.np .n-l2-bubble-inner{background:var(--g50);border-color:var(--g200);color:var(--g600)}
.n-l2-bubble.gov .n-l2-bubble-inner{background:var(--b50);border-color:#2D5F8A;color:var(--b600)}
.n-l2-bubble.hyb .n-l2-bubble-inner{background:var(--a50);border-color:#7A5218;color:var(--a600)}
.n-l2-bubble.com .n-l2-bubble-inner{background:var(--r50);border-color:#7A2828;color:var(--r600)}
.tm-metrics-note{font-size:9.5px;color:var(--tx3);margin-top:8px;line-height:1.45;padding:6px 10px;background:var(--bg);border:1px solid var(--bd);border-radius:4px}
.tm-kdv ul{margin:0;padding-left:14px}
.tm-kdv li{margin-bottom:4px}
.tm-kdv li:last-child{margin-bottom:0}
.n-l2.np{background:var(--g50);border-color:var(--g200)}
.n-l2.gov{background:var(--b50);border-color:#2D5F8A}
.n-l2.hyb{background:var(--a50);border-color:#7A5218}
.n-l2.com{background:var(--r50);border-color:#7A2828}
.n-l2.on.np{border-color:var(--g600)}
.n-l2.on.gov{border-color:var(--b600)}
.n-l2.on.hyb{border-color:var(--a600)}
.n-l2.on.com{border-color:var(--r600)}
.n-l2-name{font-size:12px;font-weight:500;margin-bottom:2px}
.np .n-l2-name{color:var(--g800)}.gov .n-l2-name{color:var(--b800)}.hyb .n-l2-name{color:var(--a800)}.com .n-l2-name{color:var(--r800)}
.n-l2-meta{font-size:10px}
.np .n-l2-meta{color:var(--g600)}.gov .n-l2-meta{color:var(--b600)}.hyb .n-l2-meta{color:var(--a600)}.com .n-l2-meta{color:var(--r600)}

.n-l3{background:var(--surface);border:1px solid var(--bd);border-left:3px solid var(--g600);border-radius:0 6px 6px 0;padding:8px 12px;text-align:center;cursor:pointer;min-width:140px;max-width:175px;user-select:none;transition:box-shadow .15s;height:76px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.n-l3:hover{box-shadow:0 2px 10px rgba(0,0,0,.3)}
.n-l3.on{border-color:var(--g600);border-left-color:var(--g600)}
.n-l3-name{font-size:11px;font-weight:500;color:var(--tx);line-height:1.3;margin-bottom:2px}
.n-l3-meta{font-size:10px;color:var(--tx3)}
.n-l3-gtv{font-size:10px;font-weight:500;color:var(--g600);margin-top:2px}

.n-ng{background:var(--sf3);border:1px solid var(--bd2);border-radius:6px;padding:8px 12px;text-align:center;cursor:pointer;min-width:140px;max-width:175px;user-select:none;transition:box-shadow .15s;height:76px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.n-ng:hover{box-shadow:0 2px 8px rgba(0,0,0,.2);border-color:var(--bd3)}
.n-ng.on{border-color:var(--tx3)}
.n-ng-name{font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:2px}
.n-ng-meta{font-size:10px;color:var(--tx3)}

.n-l4{background:var(--surface);border:1px solid var(--bd);border-radius:5px;padding:7px 9px;width:136px;position:relative;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.n-l4:hover{box-shadow:0 2px 10px rgba(0,0,0,.35);border-color:var(--bd2)}
.n-l4-name{font-size:10px;font-weight:500;color:var(--tx);line-height:1.3;padding-right:10px;margin-bottom:2px}
.n-l4-city{font-size:9px;color:var(--tx3);margin-bottom:3px}
.n-l4-gtv{font-size:11px;font-weight:600;color:var(--tx);font-variant-numeric:tabular-nums}
.n-l4-gtv.free{color:var(--g600)}
.n-l4-gtv.unk{color:var(--tx3);font-size:10px;font-weight:400}
.n-l4-row{display:flex;align-items:center;gap:4px;margin-top:3px;flex-wrap:wrap}
.n-l4-vnd{font-size:9px;color:var(--tx3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.admtag{font-size:9px;padding:1px 5px;border-radius:3px;border:1px solid;flex-shrink:0;font-weight:500}
.a-free{border-color:var(--g200);color:var(--g600);background:var(--g50)}
.a-paid{border-color:#2D5F8A;color:var(--b600);background:var(--b50)}
.a-sug{border-color:#92400E;color:var(--a600);background:var(--a50)}
.a-part{border-color:#7F1D1D;color:var(--r600);background:var(--r50)}
.vdot{width:5px;height:5px;border-radius:50%;position:absolute;top:8px;right:8px}
.vh{background:#6DB33F}.vm{background:#D97706}.vu{background:var(--bd3)}
.own-lbl{font-size:9px;color:var(--tx3);text-align:center;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
#tree-root{display:flex;flex-direction:column;align-items:center;width:max-content;min-width:100%}
.l2-row{display:flex;align-items:flex-start;gap:24px;flex-wrap:nowrap}
.l3-row{display:flex;justify-content:center;align-items:flex-start;gap:10px;flex-wrap:wrap}
.l4-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-start;max-width:456px}

/* ══ CARDS PANE ══ */
.cards-layout{display:flex;flex:1;overflow:hidden}

/* LEFT LIST */
.museum-list{width:230px;flex-shrink:0;border-right:1px solid var(--bd);overflow-y:auto;background:var(--surface)}
.list-header{padding:12px 14px 8px;border-bottom:1px solid var(--bd);font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
.list-search{padding:8px 10px;border-bottom:1px solid var(--bd)}
.list-search input{width:100%;border:1px solid var(--bd2);border-radius:4px;padding:5px 8px;font-size:11px;background:var(--sf2);color:var(--tx);outline:none;font-family:inherit}
.list-search input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(232,0,61,.15)}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .1s;user-select:none}
.list-item:hover{background:var(--sf2)}
.list-item.selected{background:var(--accent-dim);box-shadow:inset 2px 0 0 var(--accent)}
.list-item-name{font-size:11px;color:var(--tx);line-height:1.3;flex:1;margin-right:6px}
.list-item-gtv{font-size:10px;color:var(--tx3);white-space:nowrap;flex-shrink:0;font-variant-numeric:tabular-nums}
.list-item-gtv.free{color:var(--g600)}
.list-item.selected .list-item-name{font-weight:500}
.list-sel-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-left:5px;opacity:0}
.list-item.selected .list-sel-dot{opacity:1}

/* RIGHT DETAIL */
.card-detail{flex:1;overflow-y:auto;padding:20px;background:var(--bg)}
.card-detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--tx3);font-size:13px;flex-direction:column;gap:8px}
.card-detail-empty-icon{font-size:28px}

/* detail card */
.detail-card{background:var(--surface);border:1px solid var(--bd);border-radius:6px;padding:20px;max-width:680px}
.dc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
.dc-name{font-size:17px;font-weight:600;color:var(--tx);line-height:1.2;flex:1}
.dc-badges{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.ob{font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
.ob-np{background:rgba(107,179,63,.15);color:var(--g800)}
.ob-gov{background:rgba(59,130,246,.15);color:var(--b800)}
.ob-hyb{background:rgba(217,119,6,.15);color:var(--a800)}
.ob-com{background:rgba(248,113,113,.15);color:var(--r800)}
.dc-city{font-size:12px;color:var(--tx3);margin-bottom:12px}
.dc-entity{font-size:11px;color:var(--tx2);background:var(--sf2);padding:3px 8px;border-radius:3px;border:1px solid var(--bd);display:inline-block;margin-bottom:12px}
.dc-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.metric{background:var(--sf2);border-radius:4px;padding:10px 12px;border:1px solid var(--bd)}
.metric-l{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.metric-v{font-size:15px;font-weight:600;color:var(--tx);font-variant-numeric:tabular-nums}
.mv-free{color:var(--g600)}
.mv-unk{color:var(--tx3);font-weight:400;font-size:12px}
.dc-section{margin-bottom:12px}
.dc-section-title{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:6px}
.dc-row{display:flex;gap:8px;flex-wrap:wrap}
.dc-kv{display:flex;flex-direction:column;gap:2px;min-width:140px}
.dc-key{font-size:10px;color:var(--tx3)}
.dc-val{font-size:12px;color:var(--tx)}
.dc-val.unknown{color:var(--tx3);font-style:italic}
.vdot-inline{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.dc-notes{font-size:11px;color:var(--tx2);background:var(--sf2);border-radius:4px;border:1px solid var(--bd);padding:9px 11px;line-height:1.5}

/* ══ TABLE PANE ══ */
.tbar{background:var(--surface);border-bottom:1px solid var(--bd);padding:8px 20px;display:flex;gap:7px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.tbar input,.tbar select{border:1px solid var(--bd2);border-radius:5px;padding:5px 9px;font-size:12px;background:var(--sf2);color:var(--tx);outline:none;font-family:inherit}
.tbar input{width:170px}
.tbar input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(232,0,61,.15)}
.tbar select:hover{border-color:var(--bd3)}
.flabel{font-size:10px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.clr-btn{border:1px solid var(--bd2);background:none;padding:5px 9px;border-radius:5px;cursor:pointer;font-size:11px;color:var(--tx3);font-family:inherit}
.clr-btn:hover{background:var(--sf2);color:var(--tx);border-color:var(--bd3)}
.tcnt{font-size:11px;color:var(--tx3)}
.tbl-scroll{flex:1;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--sf2);padding:8px 12px;text-align:left;font-weight:600;color:var(--tx3);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd2);white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;z-index:1}
thead th:hover{color:var(--tx2)}
thead th.sorted{color:var(--tx);border-bottom-color:var(--accent)}
tbody tr{border-bottom:1px solid var(--bd)}
tbody tr:nth-child(even){background:var(--sf2)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--sf3) !important}
td{padding:8px 12px;vertical-align:middle}
.tc-n{font-weight:500;max-width:210px}
.tc-c{color:var(--tx2);white-space:nowrap}
.tc-g{font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}

const F={
  gtv(v,a){
    if(a==='Free GA'||v===0)return{s:'Free GA',c:'free'};
    if(v===null||v===undefined)return{s:'Unknown',c:'unk'};
    if(v>=1e8)return{s:'$'+(v/1e6).toFixed(0)+'M',c:''};
    if(v>=1e6)return{s:'$'+(v/1e6).toFixed(1)+'M',c:''};
    return{s:'$'+v.toLocaleString(),c:''};
  },
  vis(v){if(!v)return'—';if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(0)+'k';return''+v},
  tgtv(arr){const t=arr.reduce((s,m)=>s+(m.gtv&&m.gtv>0?m.gtv:0),0);if(!t)return'';return t>=1e9?'$'+(t/1e9).toFixed(1)+'B GTV':'$'+Math.round(t/1e6)+'M GTV'},
  vd(c,s){if(!s||s==='NOT FOUND'||s==='—')return'vu';return c==='High'?'vh':c==='Medium'?'vm':'vu'},
  vn(s){if(!s||s==='NOT FOUND'||s==='—')return'Vendor unknown';return s.length>24?s.substring(0,22)+'…':s},
  ac(a){return{'Free GA':'a-free','Paid GA':'a-paid','Suggested Admission':'a-sug','Partial Paid GA':'a-part'}[a]||'a-paid'},
  al(a){return{'Free GA':'Free','Paid GA':'Paid','Suggested Admission':'Sugg. admission','Partial Paid GA':'Partial'}[a]||a||'—'},
  oc(o){return{'Private Nonprofit':'ob-np','Public / Government':'ob-gov','Public-Private Hybrid':'ob-hyb','Commercial / For-Profit':'ob-com'}[o]||'ob-np'},
  os(o){return{'Private Nonprofit':'Nonprofit','Public / Government':'Government','Public-Private Hybrid':'Hybrid','Commercial / For-Profit':'For-Profit'}[o]||o},
  l2c(o){return{'Private Nonprofit':'np','Public / Government':'gov','Public-Private Hybrid':'hyb','Commercial / For-Profit':'com'}[o]||'np'},
  price(p){if(p===null||p===undefined)return'—';if(p===0)return'Free';return'$'+p.toFixed(2)},

function mkTree(){
  const t={};
  D.forEach(m=>{const o=m.ownership||'Unknown';if(!t[o])t[o]={ms:[],ents:{}};t[o].ms.push(m);if(m.controlling_entity){if(!t[o].ents[m.controlling_entity])t[o].ents[m.controlling_entity]=[];t[o].ents[m.controlling_entity].push(m);}});
  return ORDER.filter(o=>t[o]).map(o=>({o,ms:t[o].ms.sort((a,b)=>(b.gtv||0)-(a.gtv||0)),ents:Object.entries(t[o].ents).map(([n,ms])=>({n,ms:ms.sort((a,b)=>(b.gtv||0)-(a.gtv||0))})).sort((a,b)=>b.ms.length-a.ms.length)}));
}

const TREE=mkTree();
const openL2=new Set(),openL3=new Set();
function togL2(o){openL2.has(o)?openL2.delete(o):openL2.add(o);rTree()}
function togL3(k){openL3.has(k)?openL3.delete(k):openL3.add(k);rTree()}
function closeAllPanels(){document.querySelectorAll('.tt-panel').forEach(p=>p.classList.remove('visible'));}
function initTooltips(){
  document.querySelectorAll('.tt-panel').forEach(panel=>{
    if(!panel.querySelector('.tt-close')){
      const x=document.createElement('button');
      x.className='tt-close';x.innerHTML='&times;';
      x.addEventListener('click',e=>{e.stopPropagation();panel.classList.remove('visible');});
      panel.prepend(x);
    }
  });
  document.querySelectorAll('.l2-info').forEach(btn=>{
    const wrap=btn.closest('.l2-card-wrap');
    const panel=wrap?wrap.querySelector('.tt-panel'):null;
    if(!panel)return;
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const wasVisible=panel.classList.contains('visible');
      closeAllPanels();
      if(!wasVisible)panel.classList.add('visible');
    });
  });
  if(!document._ttOutsideClick){
    document._ttOutsideClick=true;
    document.addEventListener('click',e=>{
      if(!e.target.closest('.tt-panel'))closeAllPanels();
    });
  }
}

function rTree(){
  const agv=F.tgtv(D);
  const totalVis=D.filter(m=>m.visitors&&m.visitors>0).reduce((s,m)=>s+m.visitors,0);
  const totalGTV=D.reduce((s,m)=>s+(m.gtv||0),0);
  let h=`<div style="display:flex;justify-content:center;margin-bottom:0">
    <div class="ncol"><div class="n-root">
      <div class="n-root-title">Museum Opportunity Map</div>
      <div class="n-root-sub">${D.length} museums · United States</div>
      ${agv?`<div class="n-root-gtv">${agv} total paid GTV</div>`:''}
    </div><div class="vline"></div></div></div>`;

  h+=`<div class="l2-row">`;
  TREE.forEach(node=>{
    const isOn=openL2.has(node.o);
    const cls=F.l2c(node.o);
    const gv=F.tgtv(node.ms);
    const nodeVis=node.ms.filter(m=>m.visitors&&m.visitors>0).reduce((s,m)=>s+m.visitors,0);
    const nodeGTV=node.ms.reduce((s,m)=>s+(m.gtv||0),0);
    const visPct=totalVis>0&&nodeVis>0?Math.round(nodeVis/totalVis*100)+'%':'n/a';
    const gtvPct=totalGTV>0?Math.round(nodeGTV/totalGTV*100)+'%':'0%';
    h+=`<div class="ncol">`;
    h+=`<div class="n-l2-bubble ${cls}"><div class="n-l2-bubble-inner"><span class="n-l2-bubble-lbl">Share of listed museums</span><span>${visPct} visitors &middot; ${gtvPct} GTV</span></div></div>`;
    h+=`<div class="l2-card-wrap">`;
    h+=`<div class="l2-info ${cls}" onclick="event.stopPropagation()">i</div>`;
    h+=`<div class="n-l2 ${cls}${isOn?' on':''}" onclick="togL2('${e(node.o)}')">
      <div class="n-l2-name">${node.o}</div>
      <div class="n-l2-meta">${node.ms.length} museums${gv?' · '+gv:''}</div>
      <span class="caret">${isOn?'▲':'▼'}</span>
    </div>`;
    h+=`<div class="tt-panel">${TIPS[node.o]||''}</div>`;
    h+=`</div>`;
    if(isOn){
      const standalones=node.ms.filter(m=>!m.controlling_entity);
      const items=[
        ...node.ents.map(g=>({type:'group',ownership:node.o,data:g,sv:g.ms.reduce((s,m)=>s+(m.gtv||0),0),key:node.o+'::'+g.n})),
        ...(standalones.length?[{type:'nogroup',ownership:node.o,ms:standalones,sv:standalones.reduce((s,m)=>s+(m.gtv||0),0),key:node.o+'::__ng'}]:[])
      ].sort((a,b)=>b.sv-a.sv);
      h+=`<div class="vline-s"></div><div class="l3-row">`;
      items.forEach(item=>{
        const isOnL3=openL3.has(item.key);
        h+=`<div class="ncol">`;
        if(item.type==='group'){
          const igv=F.tgtv(item.data.ms);
          h+=`<div class="own-lbl">${F.os(item.ownership)}</div>
            <div class="n-l3${isOnL3?' on':''}" onclick="togL3('${e(item.key)}')">
              <div class="n-l3-name">${item.data.n}</div>
              <div class="n-l3-meta">${item.data.ms.length} museums</div>
              ${igv?`<div class="n-l3-gtv">${igv}</div>`:''}
              <span class="caret">${isOnL3?'▲':'▼'}</span>
            </div>`;
        } else {
          const igv=F.tgtv(item.ms);
          h+=`<div class="own-lbl">${F.os(item.ownership)}</div>
            <div class="n-ng${isOnL3?' on':''}" onclick="togL3('${e(item.key)}')">
              <div class="n-ng-name">No group associated</div>
              <div class="n-ng-meta">${item.ms.length} museums${igv?' · '+igv:''}</div>
              <span class="caret">${isOnL3?'▲':'▼'}</span>
            </div>`;
        }
        if(isOnL3){
          const ms=item.type==='group'?item.data.ms:item.ms;
          h+=`<div class="vline-s"></div><div class="l4-row">`;
          ms.forEach(m=>{
            const g=F.gtv(m.gtv,m.admission_model);
            h+=`<div class="n-l4" onclick="openMuseum('${e(m.name)}')">
              <span class="vdot ${F.vd(m.vendor_confidence,m.ticketing_system)}"></span>
              <div class="n-l4-name">${m.name}</div>
              <div class="n-l4-city">${m.city}</div>
              <div class="n-l4-row">
                <span class="n-l4-gtv ${g.c}">${g.s}</span>
                <span class="admtag ${F.ac(m.admission_model)}">${F.al(m.admission_model)}</span>
              </div>
              <div class="n-l4-vnd">${F.vn(m.ticketing_system)}</div>
            </div>`;
          });
          h+=`</div>`;
        }
        h+=`</div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;
  document.getElementById('tree-root').innerHTML=h;
  initTooltips();
}

let selectedMuseums=new Set();

const openOwnership=new Set(ORDER);
function togOwnership(o){openOwnership.has(o)?openOwnership.delete(o):openOwnership.add(o);buildList();}
function buildList(){
  const byO={};ORDER.forEach(o=>byO[o]=[]);
  D.forEach(m=>{const o=m.ownership||'Unknown';if(byO[o])byO[o].push(m);});
  ORDER.forEach(o=>byO[o].sort((a,b)=>{const ag=a.gtv>0?a.gtv:-1,bg=b.gtv>0?b.gtv:-1;return bg-ag;}));
  let html='';
  const cs=((document.getElementById('card-search')||{}).value||'').toLowerCase();
  ORDER.forEach(o=>{
    const ms=byO[o];if(!ms||!ms.length)return;
    const filtered=cs?ms.filter(m=>m.name.toLowerCase().includes(cs)):ms;
    if(!filtered.length)return;
    const isOn=openOwnership.has(o);const cls=F.l2c(o);
    html+=`<div class="list-group-hdr ${cls}" onclick="togOwnership('${e(o)}')">
      <span class="list-group-hdr-name">${F.os(o)}</span>
      <span class="list-group-hdr-cnt">${filtered.length}</span>
      <span class="list-group-hdr-caret">${isOn?'▲':'▼'}</span>
    </div>`;
    if(isOn)filtered.forEach(m=>{
      const g=F.gtv(m.gtv,m.admission_model);const sel=selectedMuseums.has(m.name);
      html+=`<div class="list-item${sel?' selected':''}" onclick="toggleMuseum('${e(m.name)}')" data-name="${m.name.replace(/"/g,'&quot;')}">
        <span class="list-item-name">${m.name}</span>
        <span class="list-item-gtv ${g.c}">${g.s}</span>
        <span class="list-sel-dot"></span>
      </div>`;
    });
  });
  document.getElementById('museum-list-items').innerHTML=html;
}

function toggleMuseum(name){
  if(selectedMuseums.has(name)) selectedMuseums.delete(name);
  else selectedMuseums.add(name);
  buildList();
  renderDetail();
}

            <div class="dc-val">${m.ownership||'—'}</div>
          </div>
          ${m.detailed_ownership?`<div class="dc-kv" style="max-width:300px"><div class="dc-key">Detailed</div><div class="dc-val" style="font-size:11px">${m.detailed_ownership}</div></div>`:''}
        </div>
      </div>
      ${m.notes?`<div class="dc-section"><div class="dc-section-title">Notes</div><div class="dc-notes">${m.notes}</div></div>`:''}
    </div>`;
  }).join('');
}

function openMuseum(name){
  switchTab('cards', document.getElementById('tab-cards'));
  selectedMuseums.clear();
  selectedMuseums.add(name);
  buildList();
  renderDetail();
  setTimeout(()=>{
    const items=document.querySelectorAll('.list-item');
    items.forEach(el=>{if(el.dataset.name===name)el.scrollIntoView({block:'nearest'});});
  },50);
}

function e(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

/* ══ TABLE ══ */
const fSets={fo:new Set(),fa:new Set(),fv:new Set()};
function togMsel(key){
  document.querySelectorAll('.msel-drop').forEach(d=>{if(d.id!=='msel-'+key+'-drop')d.classList.remove('open');});
  document.getElementById('msel-'+key+'-drop').classList.toggle('open');
}
function onChk(cb){
  const key=cb.dataset.key,val=cb.value;
  cb.checked?fSets[key].add(val):fSets[key].delete(val);
  const cnt=fSets[key].size;
  document.getElementById('msel-'+key+'-cnt').textContent=cnt?'('+cnt+')':'';
  document.getElementById('msel-'+key).querySelector('.msel-btn').classList.toggle('active',cnt>0);
  applyT();
}
document.addEventListener('click',e=>{if(!e.target.closest('.msel'))document.querySelectorAll('.msel-drop').forEach(d=>d.classList.remove('open'));});
let tSF='gtv',tSD='desc';
function applyT(){
  const fs=(document.getElementById('tfs').value||'').toLowerCase();
  let arr=D.filter(m=>{
    if(fs&&!m.name.toLowerCase().includes(fs)&&!(m.city||'').toLowerCase().includes(fs))return false;
    if(fSets.fo.size&&!fSets.fo.has(m.ownership))return false;
    if(fSets.fa.size&&!fSets.fa.has(m.admission_model))return false;
    if(fSets.fv.size){
      const v=m.ticketing_system||'';let ok=false;
      fSets.fv.forEach(f=>{if(f==='NOT FOUND'){if(!v||v==='NOT FOUND'||v==='—')ok=true;}else if(v.includes(f))ok=true;});
      if(!ok)return false;
    }
    return true;
  });
  arr.sort((a,b)=>{
    const av=tSF==='name'?a.name.toLowerCase():tSF==='gtv'?(a.gtv&&a.gtv>0?a.gtv:-1):(a.visitors||-1);
    const bv=tSF==='name'?b.name.toLowerCase():tSF==='gtv'?(b.gtv&&b.gtv>0?b.gtv:-1):(b.visitors||-1);
    if(typeof av==='string')return tSD==='asc'?av.localeCompare(bv):bv.localeCompare(av);
    return tSD==='desc'?bv-av:av-bv;
  });
  document.getElementById('tcnt').textContent=arr.length+' museum'+(arr.length!==1?'s':'');
  const uv=s=>!s||s==='NOT FOUND'||s==='—';
  const vc=m=>m.vendor_confidence==='High'?'var(--g600)':m.vendor_confidence==='Medium'?'var(--a600)':'var(--tx3)';
  document.getElementById('tbody').innerHTML=arr.map(m=>{
    const g=F.gtv(m.gtv,m.admission_model);
    return`<tr>
      <td class="tc-g" style="${g.c==='free'?'color:var(--g600)':g.c==='unk'?'color:var(--tx3);font-weight:400':''}">${g.s}</td>
      <td><button class="card-btn" onclick="openMuseum('${e(m.name)}')">Card ↗</button></td>
      <td class="tc-n">${m.name}</td>
      <td class="tc-v">${F.vis(m.visitors)}${m.visitor_year?' ('+m.visitor_year+')':''}</td>
      <td class="tc-c">${m.city||'—'}</td>
      <td style="font-size:11px;color:var(--tx2)">${m.museum_type||'—'}</td>
      <td><span class="tb ${F.oc(m.ownership)}">${F.os(m.ownership)}</span></td>
      <td style="font-size:11px;color:var(--tx2)">${m.controlling_entity||'—'}</td>
      <td><span class="tb ${F.ac(m.admission_model)}">${F.al(m.admission_model)}</span></td>
      <td style="font-size:11px;color:var(--tx2)">${F.price(m.price)}</td>
      <td style="font-size:11px"><span class="vdot ${F.vd(m.vendor_confidence,m.ticketing_system)}" style="display:inline-block;margin-right:4px;vertical-align:middle"></span>${uv(m.ticketing_system)?'Vendor unknown':m.ticketing_system}</td>
      <td style="font-size:11px;color:${vc(m)}">${uv(m.ticketing_system)?'—':(m.vendor_confidence||'—')}</td>

    </tr>`;
  }).join('');
}
function tSrt(f){
  if(tSF===f)tSD=tSD==='desc'?'asc':'desc';else{tSF=f;tSD=f==='name'?'asc':'desc';}
  ['gtv','visitors','name'].forEach(ff=>{
    const el=document.getElementById('tsi-'+ff);
    if(el)el.textContent=ff===tSF?(tSD==='desc'?'↓':'↑'):'↕';
    const th=el?.parentElement;
    if(th)th.classList.toggle('sorted',ff===tSF);
  });
  applyT();
}
function clearT(){
  document.getElementById('tfs').value='';
  Object.keys(fSets).forEach(k=>{
    fSets[k].clear();
    document.querySelectorAll('[data-key="'+k+'"]').forEach(cb=>cb.checked=false);
    document.getElementById('msel-'+k+'-cnt').textContent='';
    document.getElementById('msel-'+k).querySelector('.msel-btn').classList.remove('active');
  });
  applyT();
}

function switchTab(t,btn){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('pane-'+t).classList.add('on');
  btn.classList.add('on');
  if(t==='table')applyT();
}

function init(){
  rTree();buildList();renderDetail();applyT();
  const n=D.length;
  document.getElementById('tbar-count').textContent='United States · '+n+' museum'+(n!==1?'s':'');
}
init();

/* ── Live sync from Google Sheet ── */
const CSV_URL='https://docs.google.com/spreadsheets/d/1rYD2n1e366s3EVMw8VJPH7l2WL-QCU4WHnJBMTbeuVQ/export?format=csv&gid=1281920743';

function parseCSVLine(line){
  const r=[];let c='',q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(q&&line[i+1]==='"'){c+='"';i++;}else q=!q;}
    else if(ch===','&&!q){r.push(c.trim());c='';}
    else c+=ch;
  }
  r.push(c.trim());
  return r;
}

function parseN(s){
  if(!s)return 0;
  const n=parseFloat(String(s).replace(/[,$\s]/g,''));
  return isNaN(n)?0:n;
}

function parseSheet(text){
  const rows=text.split('\n').filter(l=>l.trim());
  return rows.slice(1).map(row=>{
    const c=parseCSVLine(row);
    return{
      name:          c[0]||'',
      ownership:     c[1]||'',
      controlling_entity: c[2]||'',
      group_type:    c[3]||'',
      museum_type:   c[4]||'',
      country:       c[5]||'',
      city:          c[6]||'',
      detailed_ownership: c[7]||'',
      visitors:      parseN(c[8]),
      visitor_year:  c[9]||'',
      price:         parseN(c[10]),
      gtv:           parseN(c[11]),
      admission_model: c[12]||'',
      visitor_source: c[13]||'',
      price_source:  c[14]||'',
      ticketing_system: c[15]||'',
      vendor_confidence: c[16]||'',
      notes:         c[17]||''
    };
  }).filter(m=>m.name);
}

fetch(CSV_URL)
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.text();})
  .then(text=>{
    const fresh=parseSheet(text);
    if(fresh.length){D=fresh;init();}
  })
  .catch(()=>{
    console.warn('Sheet fetch failed — showing cached data. Check sheet is set to Anyone with the link can view.');
  });
</script>
